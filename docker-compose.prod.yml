# ─────────────────────────────────────────────────────────────────────
# HireIQ — Production Docker Compose Overrides
# ─────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────

services:
  api:
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
    volumes: []  # No source mount in production
    restart: always
