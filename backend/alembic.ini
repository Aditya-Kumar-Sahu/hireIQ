# A generic, single database configuration.

[alembic]
# Path to migration environment
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Truncate long revision info in filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .hierarchyc output
# prepend_sys_path = .
timezone = UTC

# String to use in the version table
version_path_separator = os

# NOTE: sqlalchemy.url is set programmatically in env.py
# from the app's settings — do NOT hardcode a URL here.
